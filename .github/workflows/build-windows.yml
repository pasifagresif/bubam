name: Windows exe oluştur

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "youtube_indirici.py"
      - "requirements.txt"
      - ".github/workflows/build-windows.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: python -m pip install -r requirements.txt

      - name: Windows için statik ffmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $bin = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $bin.FullName -Destination .
          $probe = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $probe.FullName -Destination .

      - name: PyInstaller ile tek dosya exe oluştur
        run: >
          pyinstaller --onefile --windowed
          --name "YouTube_Indirici"
          --add-binary "ffmpeg.exe;."
          --add-binary "ffprobe.exe;."
          youtube_indirici.py

      - name: exe'yi artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: YouTube_Indirici-windows
          path: dist/YouTube_Indirici.exe
